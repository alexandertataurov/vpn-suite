x-env-file: &env_file
  - ${ENV_FILE:-.env}

x-service-default: &service_default
  restart: unless-stopped
  labels:
    - "com.centurylinklabs.watchtower.enable=false"

x-secure-default: &secure_default
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp

x-monitoring-default: &monitoring_default
  profiles:
    - monitoring
  restart: unless-stopped
  labels:
    - "com.centurylinklabs.watchtower.enable=false"

x-resource-tiny: &resource_tiny
  cpus: "${CPU_TINY:-0.1}"
  mem_limit: "${MEM_TINY:-64m}"

x-resource-small: &resource_small
  cpus: "${CPU_SMALL:-0.2}"
  mem_limit: "${MEM_SMALL:-256m}"

x-resource-medium: &resource_medium
  cpus: "${CPU_MEDIUM:-0.5}"
  mem_limit: "${MEM_MEDIUM:-512m}"

x-resource-large: &resource_large
  cpus: "${CPU_LARGE:-1.0}"
  mem_limit: "${MEM_LARGE:-1g}"

services:
  admin-api:
    <<: [*service_default, *secure_default, *resource_medium]
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Expose API only on localhost for smoke/E2E tooling and local debugging.
    ports:
      - "127.0.0.1:8000:8000"
    env_file: *env_file
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - OTEL_TRACES_ENDPOINT=${OTEL_TRACES_ENDPOINT:-}
      - VPN_DEFAULT_HOST=${VPN_DEFAULT_HOST:-${PUBLIC_DOMAIN}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    group_add:
      - "${DOCKER_GID:-119}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    profiles:
      - docker-telemetry
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - vpn-suite-app
      - vpn-suite-db

  reverse-proxy:
    <<: [*service_default, *resource_medium]
    build:
      context: ./docker/reverse-proxy
      dockerfile: Dockerfile
    image: vpn-suite-reverse-proxy:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    environment:
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN}
      - AGENT_ALLOW_CIDRS=${AGENT_ALLOW_CIDRS:-0.0.0.0/0 ::/0}
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config/caddy/root:/srv/root:ro
      - ./frontend/miniapp/dist:/srv/webapp:ro
      - ./frontend/admin/dist:/srv/admin:ro
      - ./frontend/shared/storybook-static:/srv/storybook:ro
      - ./secrets/agent_ca.pem:/etc/caddy/agent_ca.pem:ro
      - caddy_data:/data
    depends_on:
      admin-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 5 http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /config
    networks:
      - vpn-suite-app

  admin-ip-watcher:
    <<: [*service_default, *resource_small]
    image: docker:24-cli
    env_file: *env_file
    environment:
      - ENV_FILE=/work/.env
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-vpn-suite}
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/work/scripts:ro
      - ./.env:/work/.env:rw
    command: ["/bin/sh", "-lc", "/work/scripts/watch_admin_ip.sh"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/admin_ip_watcher.ok && [ $(( $(date +%s) - $(cat /tmp/admin_ip_watcher.ok) )) -lt 300 ]"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - vpn-suite-app

  postgres:
    <<: [*service_default, *resource_large]
    image: postgres@sha256:468d34fefd6338031787c7b8e94078975b3aaf4d66c7ead25c39cd3ba46a15c6
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track=all"
    env_file: *env_file
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vpn_admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - vpn-suite-db

  redis:
    <<: [*service_default, *resource_small]
    image: redis@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: ["sh", "-c", "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server /etc/redis/redis.conf --requirepass \"$$REDIS_PASSWORD\"; else exec redis-server /etc/redis/redis.conf; fi"]
    volumes:
      - redis_data:/data
      - ./config/redis/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli $${REDIS_PASSWORD:+-a \"$$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - vpn-suite-db

  telegram-vpn-bot:
    <<: [*service_default, *secure_default, *resource_small]
    build:
      context: .
      dockerfile: bot/Dockerfile
    ports:
      - "127.0.0.1:8090:8090"
    env_file: *env_file
    environment:
      - PANEL_URL=http://admin-api:8000
      - BOT_API_KEY=${BOT_API_KEY:-}
      - BOT_TOKEN=${BOT_TOKEN:-}
      - BOT_USERNAME=${VITE_TELEGRAM_BOT_USERNAME:-}
      - OTEL_TRACES_ENDPOINT=${OTEL_TRACES_ENDPOINT:-}
      - PORT=8090
    depends_on:
      admin-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/healthz', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - vpn-suite-app
      - vpn-suite-db

  admin-worker:
    <<: [*service_default, *secure_default, *resource_medium]
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker_main"]
    healthcheck:
      disable: true
    env_file: *env_file
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - DOCKER_HOST=unix:///var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-119}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    profiles:
      - docker-telemetry
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vpn-suite-app
      - vpn-suite-db

  prometheus:
    <<: [*monitoring_default, *resource_large]
    image: prom/prometheus@sha256:f6639335d34a77d9d9db382b92eeb7fc00934be8eae81dbc03b31cfe90411a94
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./config/monitoring/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - ./config/monitoring/discovery:/etc/prometheus/file_sd:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-19090}:9090"
    depends_on:
      admin-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vpn-suite-app

  alertmanager:
    <<: [*monitoring_default, *resource_small]
    platform: linux/amd64
    image: ${ALERTMANAGER_IMAGE:?set ALERTMANAGER_IMAGE}
    env_file: *env_file
    entrypoint:
      - /bin/sh
      - /etc/alertmanager/entrypoint.sh
    volumes:
      - ./config/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./config/monitoring/alertmanager-entrypoint.sh:/etc/alertmanager/entrypoint.sh:ro
    ports:
      - "127.0.0.1:${ALERTMANAGER_HOST_PORT:-19093}:9093"
    networks:
      - vpn-suite-app

  cadvisor:
    <<: [*monitoring_default, *resource_small]
    image: gcr.io/cadvisor/cadvisor:v0.52.0
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - vpn-suite-app

  node-exporter:
    <<: [*monitoring_default, *resource_small]
    image: prom/node-exporter@sha256:4032c6d5bfd752342c3e631c2f1de93ba6b86c41db6b167b9a35372c139e7706
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - vpn-suite-app

  loki:
    <<: [*monitoring_default, *resource_medium]
    image: grafana/loki@sha256:09a53b4a4ff81ffcd8f13886df19d33fac7a8d3aaf952e3c7e66cbade5b2fc31
    user: "0"
    command:
      - "-config.file=/etc/loki/config.yml"
    volumes:
      - ./config/monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/tmp/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - vpn-suite-app

  promtail:
    <<: [*monitoring_default, *resource_small]
    image: grafana/promtail@sha256:bf617e9d67e80247a59f717f9c1ad388d7d32dc0a1d29abd5799516d15e0a9b5
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./config/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail_positions:/promtail
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - vpn-suite-app

  grafana:
    <<: [*monitoring_default, *resource_medium]
    image: grafana/grafana@sha256:d5133220d770aba5cb655147b619fa8770b90f41d8489a821d33b1cd34d16f89
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - vpn-suite-app

  node-agent:
    <<: [*service_default, *resource_small]
    build:
      context: ./node-agent
      dockerfile: Dockerfile
    user: "0"
    group_add:
      - "${DOCKER_GID:-119}"
    env_file: *env_file
    environment:
      - SERVER_ID=${AGENT_SERVER_ID:-vpn-node-1}
      - CONTROL_PLANE_URL=${CONTROL_PLANE_URL:-https://reverse-proxy:8443}
      - AGENT_SHARED_TOKEN=${AGENT_SHARED_TOKEN}
      - MTLS_CERT_FILE=/app/secrets/agent_client_cert.pem
      - MTLS_KEY_FILE=/app/secrets/agent_client_key.pem
      - MTLS_CA_FILE=/app/secrets/agent_ca.pem
      - REQUIRE_MTLS=${REQUIRE_MTLS:-1}
      - TLS_INSECURE_SKIP_VERIFY=${TLS_INSECURE_SKIP_VERIFY:-0}
      - CONTAINER_FILTER=${AGENT_CONTAINER_FILTER:-auto}
      - INTERFACE_NAME=${AGENT_INTERFACE_NAME:-awg0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/vpn-suite/node-id:/etc/vpn-suite/node-id:ro
      - ./secrets/agent_client_cert.pem:/app/secrets/agent_client_cert.pem:ro
      - ./secrets/agent_client_key.pem:/app/secrets/agent_client_key.pem:ro
      - ./secrets/agent_ca.pem:/app/secrets/agent_ca.pem:ro
    depends_on:
      admin-api:
        condition: service_healthy
    networks:
      - vpn-suite-app
    profiles:
      - agent

volumes:
  postgres_data:
    name: vpn-suite_postgres_data
  redis_data:
    name: vpn-suite_redis_data
  caddy_data:
  grafana_data:
  loki_data:
  prometheus_data:
  promtail_positions:

networks:
  vpn-suite-app:
    driver: bridge
  vpn-suite-db:
    driver: bridge
    internal: true
