x-service-default: &service_default
  restart: unless-stopped
  labels:
    - "com.centurylinklabs.watchtower.enable=false"

x-resource-tiny: &resource_tiny
  cpus: "${CPU_TINY:-0.1}"
  mem_limit: "${MEM_TINY:-64m}"

x-resource-small: &resource_small
  cpus: "${CPU_SMALL:-0.2}"
  mem_limit: "${MEM_SMALL:-128m}"

x-resource-medium: &resource_medium
  cpus: "${CPU_MEDIUM:-0.5}"
  mem_limit: "${MEM_MEDIUM:-512m}"

services:
  discovery-runner:
    <<: [*service_default, *resource_small]
    build:
      context: .
      dockerfile: ops/discovery/Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - DISCOVERY_INTERVAL_SECONDS=60
      - DISCOVERY_OUT_DIR=/work
      - OUTLINE_MANAGER_URL=${OUTLINE_MANAGER_URL:-}
      - DISCOVERY_TARGET_TTL_SECONDS=180
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/vpn-suite/node-id:/etc/vpn-suite/node-id:rw
      - ./config/monitoring/discovery:/work
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vpn-suite-app
    profiles:
      - monitoring

  prometheus:
    volumes:
      - ./config/monitoring/discovery:/etc/prometheus/file_sd:ro
      - ./ALERTS:/etc/prometheus/alerts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  inventory:
    <<: [*service_default, *resource_small]
    build:
      context: ./monitoring/inventory
      dockerfile: Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - INVENTORY_INTERVAL_SECONDS=60
      - OUTLINE_MANAGER_URL=${OUTLINE_MANAGER_URL:-}
      - INVENTORY_TARGETS_PATH=/work/targets.json
      - INVENTORY_MAPPING_PATH=/work/mapping.json
      - INVENTORY_OVERRIDES_PATH=/work/overrides.json
      - INVENTORY_DISABLED=1
    volumes:
      - ./config/monitoring/discovery:/work
    depends_on:
      - postgres
    networks:
      - vpn-suite-app
      - vpn-suite-db
    profiles:
      - monitoring

  outline-poller:
    <<: [*service_default, *resource_small]
    build:
      context: ./monitoring/outline-poller
      dockerfile: Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - OUTLINE_MANAGER_URL=${OUTLINE_MANAGER_URL:-}
      - OUTLINE_TIMEOUT_SECONDS=${OUTLINE_REQUEST_TIMEOUT_SECONDS:-15}
      - POLL_INTERVAL_SECONDS=30
      - HTTP_PORT=9106
    networks:
      - vpn-suite-app
    profiles:
      - monitoring

  outline-ss-proxy:
    <<: [*service_default, *resource_tiny]
    image: alpine/socat
    network_mode: host
    command: ["-T", "15", "TCP-LISTEN:19092,fork,reuseaddr", "TCP:127.0.0.1:9092"]
    profiles:
      - monitoring

  wg-exporter:
    <<: [*service_default, *resource_small]
    build:
      context: ./monitoring/wg-exporter
      dockerfile: Dockerfile
    environment:
      - WG_CONTAINER=${WG_CONTAINER:-amnezia-awg2}
      - WG_INTERFACE=${WG_INTERFACE:-awg0}
      - WG_EXPORTER_PORT=9586
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9586:9586"
    networks:
      - vpn-suite-app
    profiles:
      - monitoring
