x-service-default: &service_default
  restart: unless-stopped
  labels:
    - "com.centurylinklabs.watchtower.enable=false"

x-resource-tiny: &resource_tiny
  cpus: "${CPU_TINY:-0.1}"
  mem_limit: "${MEM_TINY:-64m}"

x-resource-small: &resource_small
  cpus: "${CPU_SMALL:-0.2}"
  mem_limit: "${MEM_SMALL:-128m}"

x-resource-medium: &resource_medium
  cpus: "${CPU_MEDIUM:-0.5}"
  mem_limit: "${MEM_MEDIUM:-512m}"

services:
  admin-api:
    environment:
      - OTEL_TRACES_ENDPOINT=otel-collector:4317

  telegram-vpn-bot:
    environment:
      - OTEL_TRACES_ENDPOINT=otel-collector:4317

  discovery-runner:
    <<: [*service_default, *resource_small]
    build:
      context: .
      dockerfile: ops/discovery/Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - DISCOVERY_INTERVAL_SECONDS=60
      - DISCOVERY_OUT_DIR=/work
      - DISCOVERY_TARGET_TTL_SECONDS=180
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/vpn-suite/node-id:/etc/vpn-suite/node-id:rw
      - ./config/monitoring/discovery:/work
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vpn-suite-app
    profiles:
      - monitoring

  grafana:
    depends_on:
      - tempo

  prometheus:
    volumes:
      - ./config/monitoring/discovery:/etc/prometheus/file_sd:ro
      - ./ALERTS:/etc/prometheus/alerts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  inventory:
    <<: [*service_default, *resource_small]
    build:
      context: ./monitoring/inventory
      dockerfile: Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - INVENTORY_INTERVAL_SECONDS=60
      - INVENTORY_TARGETS_PATH=/work/targets.json
      - INVENTORY_MAPPING_PATH=/work/mapping.json
      - INVENTORY_OVERRIDES_PATH=/work/overrides.json
      - INVENTORY_DISABLED=1
    volumes:
      - ./config/monitoring/discovery:/work
    depends_on:
      - postgres
    networks:
      - vpn-suite-app
      - vpn-suite-db
    profiles:
      - monitoring

  wg-exporter:
    <<: [*service_default, *resource_small]
    build:
      context: ./monitoring/wg-exporter
      dockerfile: Dockerfile
    environment:
      - WG_CONTAINER=${WG_CONTAINER:-amnezia-awg2}
      - WG_INTERFACE=${WG_INTERFACE:-awg0}
      - WG_EXPORTER_PORT=9586
      - NODE_ID=${NODE_ID:-}
      - SERVER_ID=${SERVER_ID:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9586:9586"
    networks:
      - vpn-suite-app
    profiles:
      - monitoring

  tempo:
    <<: [*service_default, *resource_medium]
    image: grafana/tempo:2.3.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./config/monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
    networks:
      - vpn-suite-app
    profiles:
      - monitoring

  otel-collector:
    <<: [*service_default, *resource_small]
    image: otel/opentelemetry-collector-contrib:0.91.0
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ./config/monitoring/otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on:
      - tempo
    networks:
      - vpn-suite-app
    profiles:
      - monitoring

volumes:
  tempo_data:
