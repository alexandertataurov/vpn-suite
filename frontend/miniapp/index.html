<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>VPN Suite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!--
      Pre-React bootstrap: theme and data-tg. This is the only allowed direct window.Telegram
      access. Runs before main.tsx; telegramClient (telegramCoreClient) is the boundary for all
      other Telegram access. See frontend/miniapp/src/telegram/README.md.
    -->
    <script>
      const tgColorScheme = window.Telegram?.WebApp?.colorScheme;
      const prefersLight = window.matchMedia?.('(prefers-color-scheme: light)')?.matches === true;
      const initialTheme = tgColorScheme
        ? (tgColorScheme === 'light' ? 'consumer-light' : 'consumer-dark')
        : (prefersLight ? 'consumer-light' : 'consumer-dark');
      if (window.Telegram?.WebApp) document.documentElement.setAttribute('data-tg', 'true');
      document.documentElement.setAttribute('data-theme', initialTheme);
      document.documentElement.style.colorScheme = initialTheme === 'consumer-light' ? 'light' : 'dark';
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
