<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPN Suite</title>
    <script>
      (function(){
        var t = localStorage.getItem('vpn-suite-theme');
        if (t !== 'light' && t !== 'dark' && t !== 'dim') t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.style.colorScheme = t === 'light' ? 'light' : 'dark';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
