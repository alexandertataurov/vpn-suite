x-env-file: &env_file
  - ${ENV_FILE:-.env}

x-service-default: &service_default
  restart: unless-stopped
  labels:
    - "com.centurylinklabs.watchtower.enable=false"

x-secure-default: &secure_default
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp

# Avoid duplicate security_opt when merging with base compose (base already sets it).
x-secure-default-no-opt: &secure_default_no_opt
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp

x-monitoring-default: &monitoring_default
  profiles:
    - monitoring
  restart: unless-stopped
  labels:
    - "com.centurylinklabs.watchtower.enable=false"

x-resource-tiny: &resource_tiny
  cpus: "${CPU_TINY:-0.1}"
  mem_limit: "${MEM_TINY:-64m}"

x-resource-small: &resource_small
  cpus: "${CPU_SMALL:-0.2}"
  mem_limit: "${MEM_SMALL:-128m}"

x-resource-medium: &resource_medium
  cpus: "${CPU_MEDIUM:-0.5}"
  mem_limit: "${MEM_MEDIUM:-512m}"

x-resource-large: &resource_large
  cpus: "${CPU_LARGE:-1.0}"
  mem_limit: "${MEM_LARGE:-1g}"

services:
  admin-api:
    <<: [*service_default, *secure_default, *resource_medium]
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "18001:8000"
    env_file: *env_file
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vpn-suite

  reverse-proxy:
    <<: [*service_default, *resource_medium]
    image: caddy@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    ports:
      - "18080:80"
    volumes:
      - ./config/caddy/Caddyfile.audit:/etc/caddy/Caddyfile:ro
      - ./config/caddy/root:/srv/root:ro
      - ./frontend/miniapp/dist:/srv/webapp:ro
      - ./frontend/admin/dist:/srv/admin:ro
      - caddy_data:/data
    depends_on:
      admin-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /config
    networks:
      - vpn-suite

  postgres:
    <<: [*service_default, *resource_large]
    image: postgres@sha256:468d34fefd6338031787c7b8e94078975b3aaf4d66c7ead25c39cd3ba46a15c6
    env_file: *env_file
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vpn_admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - vpn-suite

  redis:
    <<: [*service_default, *resource_small]
    image: redis@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - vpn-suite

  telegram-vpn-bot:
    <<: [*service_default, *secure_default, *resource_small]
    build:
      context: .
      dockerfile: bot/Dockerfile
    ports:
      - "18090:8090"
    env_file: *env_file
    environment:
      - PANEL_URL=http://admin-api:8000
      - BOT_API_KEY=${BOT_API_KEY:-}
      # Audit safety: require a dedicated bot token (avoids getUpdates conflicts with any existing stack).
      - BOT_TOKEN=${BOT_TOKEN_AUDIT:-}
      - BOT_USERNAME=${VITE_TELEGRAM_BOT_USERNAME_AUDIT:-}
      - PORT=8090
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    depends_on:
      admin-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vpn-suite

  prometheus:
    <<: [*monitoring_default, *resource_large]
    image: prom/prometheus@sha256:f6639335d34a77d9d9db382b92eeb7fc00934be8eae81dbc03b31cfe90411a94
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./config/monitoring/discovery:/etc/prometheus/file_sd:ro
    ports:
      - "19090:9090"
    depends_on:
      admin-api:
        condition: service_healthy
    networks:
      - vpn-suite

  cadvisor:
    <<: [*monitoring_default, *resource_small]
    image: gcr.io/cadvisor/cadvisor:v0.52.0
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "18081:8080"
    networks:
      - vpn-suite

  node-exporter:
    <<: [*monitoring_default, *resource_small]
    image: prom/node-exporter@sha256:4032c6d5bfd752342c3e631c2f1de93ba6b86c41db6b167b9a35372c139e7706
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "19100:9100"
    networks:
      - vpn-suite

  loki:
    <<: [*monitoring_default, *resource_medium]
    image: grafana/loki@sha256:09a53b4a4ff81ffcd8f13886df19d33fac7a8d3aaf952e3c7e66cbade5b2fc31
    command:
      - "-config.file=/etc/loki/config.yml"
    volumes:
      - ./config/monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/tmp/loki
    ports:
      - "13100:3100"
    networks:
      - vpn-suite

  promtail:
    <<: [*monitoring_default, *resource_small]
    image: grafana/promtail@sha256:bf617e9d67e80247a59f717f9c1ad388d7d32dc0a1d29abd5799516d15e0a9b5
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./config/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail_positions:/promtail
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - vpn-suite

  grafana:
    <<: [*monitoring_default, *resource_medium]
    image: grafana/grafana@sha256:d5133220d770aba5cb655147b619fa8770b90f41d8489a821d33b1cd34d16f89
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - vpn-suite

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  grafana_data:
  loki_data:
  promtail_positions:

networks:
  vpn-suite:
    driver: bridge
