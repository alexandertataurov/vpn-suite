openapi: 3.1.0
info:
  title: VPN Admin API
  description: Control plane for commercial VPN (AmneziaWG).
  version: 0.1.0-rc.1
paths:
  /api/v1/app/settings:
    get:
      tags:
      - app
      summary: Get App Settings
      description: Return safe app settings plus capability flags for critical settings
        controls.
      operationId: get_app_settings_api_v1_app_settings_get
      security:
      - HTTPBearer: []
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - app
      summary: Update App Settings
      description: Update non-secret app settings at runtime. Changes reset on process
        restart.
      operationId: update_app_settings_api_v1_app_settings_patch
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppSettingsUpdateBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/app/env:
    get:
      tags:
      - app
      summary: Get Env File
      description: Return full env file content for admin editing (includes secrets).
      operationId: get_env_file_api_v1_app_env_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvFileOut'
      security:
      - HTTPBearer: []
    put:
      tags:
      - app
      summary: Update Env File
      description: Overwrite the env file. Requires settings:dangerous and env-editor
        feature flag.
      operationId: update_env_file_api_v1_app_env_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvFileUpdateBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvFileOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/app/settings/cleanup-db:
    post:
      tags:
      - app
      summary: Cleanup Db
      description: Delete end-user data. Requires settings:dangerous and CLEANUP_DB_CONFIRM_TOKEN.
      operationId: cleanup_db_api_v1_app_settings_cleanup_db_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupDbBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/auth/login:
    post:
      tags:
      - auth
      summary: Login
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - auth
      summary: Logout
      description: 'Revoke refresh token: add to blocklist so it cannot be used for
        /refresh.'
      operationId: logout_api_v1_auth_logout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh
      operationId: refresh_api_v1_auth_refresh_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      security:
      - HTTPBearer: []
  /api/v1/auth/totp/setup:
    post:
      tags:
      - auth
      summary: Totp Setup
      description: 'Enable 2FA: generate TOTP secret, store on user, return provisioning_uri
        for QR.'
      operationId: totp_setup_api_v1_auth_totp_setup_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotpSetupResponse'
      security:
      - HTTPBearer: []
  /api/v1/auth/totp/disable:
    post:
      tags:
      - auth
      summary: Totp Disable
      description: 'Disable 2FA: clear TOTP secret.'
      operationId: totp_disable_api_v1_auth_totp_disable_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/log/frontend-error:
    post:
      tags:
      - log
      summary: Log Frontend Error
      description: Accept frontend error reports; log at ERROR.
      operationId: log_frontend_error_api_v1_log_frontend_error_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FrontendErrorIn'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/log/events:
    post:
      tags:
      - log
      summary: Ingest Frontend Events
      description: 'Accept batched frontend telemetry events with validation, sampling,
        and redaction.


        This endpoint intentionally allows unauthenticated writes so login-failure
        telemetry

        (emitted before a JWT exists) is still captured. Payload shape is constrained
        by schema,

        sensitive keys are redacted, and global API rate limiting still applies.'
      operationId: ingest_frontend_events_api_v1_log_events_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FrontendTelemetryBatchIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrontendTelemetryBatchOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/overview/dashboard_timeseries:
    get:
      tags:
      - overview
      summary: Get Dashboard Timeseries Endpoint
      description: 'Timeseries for dashboard charts: cluster peers count and rx/tx
        bytes. Empty when telemetry not available (e.g. agent mode).'
      operationId: get_dashboard_timeseries_endpoint_api_v1_overview_dashboard_timeseries_get
      security:
      - HTTPBearer: []
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardTimeseriesOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/overview/telemetry:
    get:
      tags:
      - overview
      summary: Get Overview Telemetry Alias
      description: 'Alias for legacy clients: same as /overview/dashboard_timeseries.'
      operationId: get_overview_telemetry_alias_api_v1_overview_telemetry_get
      security:
      - HTTPBearer: []
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardTimeseriesOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/overview/health-snapshot:
    get:
      tags:
      - overview
      summary: Get Health Snapshot
      description: Lightweight health snapshot for UI freshness indicators.
      operationId: get_health_snapshot_api_v1_overview_health_snapshot_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshotOut'
      security:
      - HTTPBearer: []
  /api/v1/_debug/metrics-targets:
    get:
      tags:
      - overview
      summary: Get Metrics Targets
      description: Prometheus targets (auth-protected).
      operationId: get_metrics_targets_api_v1__debug_metrics_targets_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/overview:
    get:
      tags:
      - overview
      summary: Get Overview
      description: Aggregate counts for dashboard. Admin or bot auth. MRR = sum of
        monthly value of active subs.
      operationId: get_overview_api_v1_overview_get
      security:
      - HTTPBearer: []
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewStats'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/overview/connection_nodes:
    get:
      tags:
      - overview
      summary: Get Connection Nodes
      description: 'Unified connection nodes: servers (with peer count). For dashboard
        system view.'
      operationId: get_connection_nodes_api_v1_overview_connection_nodes_get
      security:
      - HTTPBearer: []
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionNodesOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/overview/operator:
    get:
      tags:
      - overview
      summary: Get Overview Operator
      description: 'Operator console: health strip, cluster matrix, incidents, servers,
        timeseries.'
      operationId: get_overview_operator_api_v1_overview_operator_get
      security:
      - HTTPBearer: []
      parameters:
      - name: time_range
        in: query
        required: false
        schema:
          type: string
          default: 1h
          title: Time Range
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analytics/revenue:
    get:
      tags:
      - analytics
      summary: Get Revenue
      description: Revenue KPIs for admin dashboard. Updates Prometheus gauges. Cached
        1h.
      operationId: get_revenue_api_v1_analytics_revenue_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueSnapshotOut'
      security:
      - HTTPBearer: []
  /api/v1/analytics/telemetry/services:
    get:
      tags:
      - analytics
      summary: Get Telemetry Services
      description: Per-service scrape status for Admin Dashboard. Cached 30s. Graceful
        degradation when Prometheus unavailable.
      operationId: get_telemetry_services_api_v1_analytics_telemetry_services_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryServicesOut'
      security:
      - HTTPBearer: []
  /api/v1/analytics/telemetry/services/{job}/{action}:
    post:
      tags:
      - analytics
      summary: Control Telemetry Service
      description: 'Start/stop/restart a scrape service by Prometheus job name.


        Implementation detail: maps job -> Docker container (compose_service/name)

        on the local Docker telemetry host and proxies to docker telemetry service.'
      operationId: control_telemetry_service_api_v1_analytics_telemetry_services__job___action__post
      security:
      - HTTPBearer: []
      parameters:
      - name: job
        in: path
        required: true
        schema:
          type: string
          title: Job
      - name: action
        in: path
        required: true
        schema:
          type: string
          title: Action
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analytics/metrics/kpis:
    get:
      tags:
      - analytics
      summary: Get Metrics Kpis
      description: 'Aggregated KPIs: request rate, error rate, p95 latency. Cached
        30s.'
      operationId: get_metrics_kpis_api_v1_analytics_metrics_kpis_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsKpisOut'
      security:
      - HTTPBearer: []
  /api/v1/analytics/funnel-kpis:
    get:
      tags:
      - analytics
      summary: Get Funnel Kpis
      description: Funnel event counts and conversion ratios for admin dashboard (spec
        11.4).
      operationId: get_funnel_kpis_api_v1_analytics_funnel_kpis_get
      security:
      - HTTPBearer: []
      parameters:
      - name: days
        in: query
        required: false
        schema:
          type: integer
          maximum: 90
          minimum: 1
          default: 30
          title: Days
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunnelKpisOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/revenue/overview:
    get:
      tags:
      - admin-revenue
      summary: Get Revenue Overview Endpoint
      description: Full revenue + subscription health + referral metrics. Redis cache
        60s, fallback in-memory.
      operationId: get_revenue_overview_endpoint_api_v1_admin_revenue_overview_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueOverviewOut'
      security:
      - HTTPBearer: []
  /api/v1/admin/revenue/daily:
    get:
      tags:
      - admin-revenue
      summary: Get Revenue Daily
      description: Daily revenue series for charts (last N days).
      operationId: get_revenue_daily_api_v1_admin_revenue_daily_get
      security:
      - HTTPBearer: []
      parameters:
      - name: days
        in: query
        required: false
        schema:
          type: integer
          default: 30
          title: Days
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RevenueDayOut'
                title: Response Get Revenue Daily Api V1 Admin Revenue Daily Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/abuse/signals:
    get:
      tags:
      - admin-abuse
      summary: List Abuse Signals
      description: List abuse signals (risk flags). Filter by user_id, resolved.
      operationId: list_abuse_signals_api_v1_admin_abuse_signals_get
      security:
      - HTTPBearer: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: user_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: User Id
      - name: resolved
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Resolved
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbuseListOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/abuse/run:
    post:
      tags:
      - admin-abuse
      summary: Run Abuse Detection Endpoint
      description: Run abuse detection job; persist new signals.
      operationId: run_abuse_detection_endpoint_api_v1_admin_abuse_run_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbuseRunOut'
      security:
      - HTTPBearer: []
  /api/v1/admin/abuse/signals/{signal_id}/action:
    post:
      tags:
      - admin-abuse
      summary: Abuse Signal Action
      description: 'Apply action for abuse signal: revoke_devices (revoke all user
        devices) or ban_user (set user.is_banned).'
      operationId: abuse_signal_action_api_v1_admin_abuse_signals__signal_id__action_post
      security:
      - HTTPBearer: []
      parameters:
      - name: signal_id
        in: path
        required: true
        schema:
          type: string
          title: Signal Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbuseActionIn'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/abuse/signals/{signal_id}/resolve:
    post:
      tags:
      - admin-abuse
      summary: Resolve Abuse Signal
      description: Mark signal as resolved.
      operationId: resolve_abuse_signal_api_v1_admin_abuse_signals__signal_id__resolve_post
      security:
      - HTTPBearer: []
      parameters:
      - name: signal_id
        in: path
        required: true
        schema:
          type: string
          title: Signal Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/retention/rules:
    get:
      tags:
      - admin-retention
      summary: List Retention Rules
      operationId: list_retention_rules_api_v1_admin_retention_rules_get
      security:
      - HTTPBearer: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: enabled
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Enabled
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionRuleListOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - admin-retention
      summary: Create Retention Rule
      operationId: create_retention_rule_api_v1_admin_retention_rules_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetentionRuleIn'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionRuleOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/retention/rules/{rule_id}:
    patch:
      tags:
      - admin-retention
      summary: Update Retention Rule
      operationId: update_retention_rule_api_v1_admin_retention_rules__rule_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          title: Rule Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetentionRuleIn'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionRuleOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - admin-retention
      summary: Delete Retention Rule
      operationId: delete_retention_rule_api_v1_admin_retention_rules__rule_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          title: Rule Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/retention/run:
    post:
      tags:
      - admin-retention
      summary: Run Retention Engine
      operationId: run_retention_engine_api_v1_admin_retention_run_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionRunOut'
      security:
      - HTTPBearer: []
  /api/v1/admin/pricing/history:
    get:
      tags:
      - admin-pricing
      summary: List Price History
      operationId: list_price_history_api_v1_admin_pricing_history_get
      security:
      - HTTPBearer: []
      parameters:
      - name: plan_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Plan Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceHistoryListOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/pricing/plans/{plan_id}/price:
    post:
      tags:
