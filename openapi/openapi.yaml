      required:
      - action
      title: AbuseActionIn
    AbuseListOut:
      properties:
        items:
          items:
            $ref: '#/components/schemas/AbuseSignalOut'
          type: array
          title: Items
        total:
          type: integer
          title: Total
      type: object
      required:
      - items
      - total
      title: AbuseListOut
    AbuseRunOut:
      properties:
        users_scored:
          type: integer
          title: Users Scored
        signals_created:
          type: integer
          title: Signals Created
        high_risk:
          type: integer
          title: High Risk
      type: object
      required:
      - users_scored
      - signals_created
      - high_risk
      title: AbuseRunOut
    AbuseSignalOut:
      properties:
        id:
          type: string
          title: Id
        user_id:
          type: integer
          title: User Id
        signal_type:
          type: string
          title: Signal Type
        severity:
          type: string
          title: Severity
        payload:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Payload
        created_at:
          type: string
          title: Created At
        resolved_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Resolved At
      type: object
      required:
      - id
      - user_id
      - signal_type
      - severity
      - payload
      - created_at
      - resolved_at
      title: AbuseSignalOut
    ActionCreate:
      properties:
        type:
          type: string
          title: Type
          description: sync | apply_peers | drain | undrain | restart_service | rotate_keys
            | apply_profile | apply_obfuscation_h | validate_profile | firewall_ports_check
        payload:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Payload
      type: object
      required:
      - type
      title: ActionCreate
    ActionCreateOut:
      properties:
        action_id:
          type: string
          title: Action Id
        correlation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Correlation Id
      type: object
      required:
      - action_id
      title: ActionCreateOut
    ActionListOut:
      properties:
        items:
          items:
            $ref: '#/components/schemas/ActionOut'
          type: array
          title: Items
        total:
          type: integer
          title: Total
      type: object
      required:
      - items
      - total
      title: ActionListOut
    ActionOut:
      properties:
        id:
          type: string
          title: Id
        server_id:
          type: string
          title: Server Id
        type:
          type: string
          title: Type
        status:
          type: string
          title: Status
        requested_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Requested By
        requested_at:
          type: string
          format: date-time
          title: Requested At
        started_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Started At
        finished_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Finished At
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
        correlation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Correlation Id
        logs:
          items:
            $ref: '#/components/schemas/AgentActionLogOut'
          type: array
          title: Logs
      type: object
      required:
      - id
      - server_id
      - type
      - status
      - requested_at
      title: ActionOut
    AdminIssuePeerPeerOut:
      properties:
        id:
          type: string
          title: Id
        server_id:
          type: string
          title: Server Id
        device_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Device Name
        public_key:
          type: string
          title: Public Key
        issued_at:
          type: string
          format: date-time
          title: Issued At
      type: object
      required:
      - id
      - server_id
      - device_name
      - public_key
      - issued_at
      title: AdminIssuePeerPeerOut
    AdminIssuePeerRequest:
      properties:
        user_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: User Id
        subscription_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Subscription Id
        label:
          anyOf:
          - type: string
          - type: 'null'
          title: Label
        device_limit:
          anyOf:
          - type: integer
