      description: 'Stub: push-mode action request (prefer poll/report).'
    AgentV1ActionPollOut:
      properties:
        action_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Action Id
        type:
          anyOf:
          - type: string
          - type: 'null'
          title: Type
        payload:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Payload
      type: object
      title: AgentV1ActionPollOut
      description: 'Pull-mode: next pending action for server_id; empty if none.'
    AgentV1ActionReportIn:
      properties:
        action_id:
          type: string
          title: Action Id
        status:
          type: string
          title: Status
          description: completed | failed
        message:
          type: string
          title: Message
          default: ''
        meta:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Meta
      type: object
      required:
      - action_id
      - status
      title: AgentV1ActionReportIn
      description: Agent reports action completion or failure.
    AgentV1PeerOut:
      properties:
        public_key:
          type: string
          title: Public Key
        allowed_ips:
          type: string
          title: Allowed Ips
          default: ''
        last_handshake_age_sec:
          anyOf:
          - type: integer
          - type: 'null'
          title: Last Handshake Age Sec
        rx_bytes:
          type: integer
          title: Rx Bytes
          default: 0
        tx_bytes:
          type: integer
          title: Tx Bytes
          default: 0
        rtt_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rtt Ms
        packet_loss_pct:
          anyOf:
          - type: number
          - type: 'null'
          title: Packet Loss Pct
      type: object
      required:
      - public_key
      title: AgentV1PeerOut
      description: Single peer in agent v1 peers list (from heartbeat or snapshot).
    AgentV1StatusOut:
      properties:
        server_id:
          type: string
          title: Server Id
        agent_version:
          type: string
          title: Agent Version
          default: unknown
        interface_name:
          type: string
          title: Interface Name
          default: awg0
        last_heartbeat_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Heartbeat Ts
      type: object
      required:
      - server_id
      title: AgentV1StatusOut
      description: Agent v1 status from last heartbeat (Redis).
    AgentV1TelemetryOut:
      properties:
        server_id:
          type: string
          title: Server Id
        peer_count:
          type: integer
          title: Peer Count
          default: 0
        total_rx_bytes:
          type: integer
          title: Total Rx Bytes
          default: 0
        total_tx_bytes:
          type: integer
          title: Total Tx Bytes
          default: 0
        health_score:
          type: number
          title: Health Score
          default: 1.0
        status:
          type: string
          title: Status
          default: unknown
      type: object
      required:
      - server_id
      title: AgentV1TelemetryOut
      description: Agent v1 telemetry from last heartbeat (Redis).
    AlertItem:
      properties:
        id:
          type: string
          title: Id
        severity:
          type: string
          enum:
          - critical
          - warning
          - info
          title: Severity
        rule:
