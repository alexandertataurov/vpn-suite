      type: object
      required:
      - peer
      - config_awg
      - config_wg_obf
      - config_wg
      - request_id
      title: AdminIssuePeerResponse
    AdminRevokePeerResponse:
      properties:
        request_id:
          type: string
          title: Request Id
        message:
          type: string
          title: Message
          default: Peer revoked
      type: object
      required:
      - request_id
      title: AdminRevokePeerResponse
    AdminRotatePeerResponse:
      properties:
        config_awg:
          $ref: '#/components/schemas/ConfigEntryOut'
        config_wg_obf:
          $ref: '#/components/schemas/ConfigEntryOut'
        config_wg:
          $ref: '#/components/schemas/ConfigEntryOut'
        request_id:
          type: string
          title: Request Id
      type: object
      required:
      - config_awg
      - config_wg_obf
      - config_wg
      - request_id
      title: AdminRotatePeerResponse
    AgentAckOut:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
        server_time_utc:
          type: string
          format: date-time
          title: Server Time Utc
      type: object
      required:
      - server_time_utc
      title: AgentAckOut
    AgentActionLogOut:
      properties:
        ts:
          type: string
          format: date-time
          title: Ts
        level:
          type: string
          title: Level
        message:
          type: string
          title: Message
        meta:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Meta
      type: object
      required:
      - ts
      - level
      - message
      title: AgentActionLogOut
    AgentDesiredPeer:
      properties:
        public_key:
          type: string
          title: Public Key
        allowed_ips:
          type: string
          title: Allowed Ips
          default: 0.0.0.0/0, ::/0
        persistent_keepalive:
          type: integer
          title: Persistent Keepalive
          default: 25
        preshared_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Preshared Key
      type: object
      required:
      - public_key
      title: AgentDesiredPeer
    AgentDesiredStateOut:
      properties:
        server_id:
          type: string
          title: Server Id
        interface_name:
          type: string
          title: Interface Name
          default: awg0
        revision:
          type: string
          title: Revision
          description: Opaque revision for idempotency/caching
        peers:
          items:
            $ref: '#/components/schemas/AgentDesiredPeer'
          type: array
          title: Peers
        correlation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Correlation Id
          description: Request/correlation ID for logs and audit
        obfuscation_h:
          anyOf:
          - $ref: '#/components/schemas/ObfuscationHOut'
          - type: 'null'
          description: When set, node should apply AWG_H1–H4 and restart AmneziaWG
        obfuscation_full:
          anyOf:
          - $ref: '#/components/schemas/ObfuscationFullOut'
          - type: 'null'
          description: When set, node should apply AWG_S1,S2,Jc,Jmin,Jmax,H1–H4 and
            restart AmneziaWG
      type: object
      required:
      - server_id
      - revision
      - peers
      title: AgentDesiredStateOut
    AgentHeartbeatIn:
      properties:
        server_id:
          type: string
          title: Server Id
          description: Control-plane server_id this agent manages
        container_name:
          type: string
          title: Container Name
          description: Local AmneziaWG container name (amnezia-awg*)
        host_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Host Id
          description: Stable host id
        container_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Container Id
          description: Docker container id
        classification:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Classification
          description: Discovery classification
        confidence:
          anyOf:
          - type: number
          - type: 'null'
          title: Confidence
          description: Discovery confidence 0..1
        evidence:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Evidence
          description: Evidence strings
        interface_name:
          type: string
          title: Interface Name
          default: awg0
        public_key:
          type: string
          title: Public Key
          default: ''
        listen_port:
          type: integer
          maximum: 65535.0
          minimum: 0.0
          title: Listen Port
          default: 0
        peer_count:
          type: integer
          minimum: 0.0
          title: Peer Count
          default: 0
        total_rx_bytes:
          type: integer
          minimum: 0.0
          title: Total Rx Bytes
          default: 0
        total_tx_bytes:
          type: integer
          minimum: 0.0
          title: Total Tx Bytes
          default: 0
        health_score:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Health Score
          default: 1.0
        status:
          type: string
          title: Status
          description: healthy|degraded|unhealthy|unknown
          default: unknown
        agent_version:
          type: string
          title: Agent Version
          default: unknown
        ts_utc:
          type: string
          format: date-time
          title: Ts Utc
          description: Agent timestamp UTC
        peers:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Peers
          description: Per-peer telemetry from node
        obfuscation:
          anyOf:
          - additionalProperties:
              anyOf:
              - type: integer
              - type: string
            type: object
          - type: 'null'
          title: Obfuscation
          description: Runtime obfuscation values from node heartbeat
        packet_loss_pct:
          anyOf:
          - type: number
            maximum: 100.0
            minimum: 0.0
          - type: 'null'
          title: Packet Loss Pct
        interface_stats:
          anyOf:
          - additionalProperties:
              anyOf:
              - type: integer
              - type: number
            type: object
          - type: 'null'
          title: Interface Stats
        churn:
          anyOf:
          - additionalProperties:
              anyOf:
              - type: integer
              - type: number
            type: object
          - type: 'null'
          title: Churn
      additionalProperties: true
      type: object
      required:
      - server_id
      - container_name
      - ts_utc
      title: AgentHeartbeatIn
    AgentV1ActionExecuteIn:
      properties:
        type:
          type: string
          title: Type
          description: Action type e.g. sync, apply_peers
        payload:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Payload
      type: object
      required:
      - type
