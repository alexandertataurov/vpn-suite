        config_wg_obf:
          $ref: '#/components/schemas/ConfigEntryOut'
        config_wg:
          $ref: '#/components/schemas/ConfigEntryOut'
        request_id:
          type: string
          title: Request Id
        peer_created:
          type: boolean
          title: Peer Created
