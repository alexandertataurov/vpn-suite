# Prometheus config for VPN Suite control plane.
# Targets are provided via file_sd (targets.json) generated by ops/discovery.

global:
  scrape_interval: 5s
  evaluation_interval: 10s
  external_labels:
    env: 'default'  # Override per deployment (prod/stage/dev)

rule_files:
  - /etc/prometheus/alert_rules.yml
  - /etc/prometheus/alerts/unified-alerts.yml
  - /etc/prometheus/recording_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

remote_write:
  - url: http://victoria-metrics:8428/api/v1/write

scrape_configs:
  - job_name: "admin-api"
    metrics_path: /metrics
    scheme: http
    scrape_interval: 3s
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: admin-api
        action: keep
      - target_label: service_name
        replacement: admin-api
      - source_labels: [__meta_file_sd_label_host_id]
        target_label: node_id
        regex: (.+)
        replacement: ${1}

  - job_name: "cadvisor"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: cadvisor
        action: keep
      - target_label: service_name
        replacement: cadvisor
      - source_labels: [__meta_file_sd_label_host_id]
        target_label: node_id
        regex: (.+)
        replacement: ${1}

  - job_name: "node-exporter"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: node-exporter
        action: keep
      - target_label: service_name
        replacement: node-exporter
      - source_labels: [__meta_file_sd_label_host_id]
        target_label: node_id
        regex: (.+)
        replacement: ${1}

  - job_name: "node-agent"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: node-agent
        action: keep
      - target_label: service_name
        replacement: node-agent
      - source_labels: [__meta_file_sd_label_host_id]
        target_label: node_id
        regex: (.+)
        replacement: ${1}

  - job_name: "telegram-vpn-bot"
    metrics_path: /metrics
    scheme: http
    scrape_interval: 3s
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: telegram-vpn-bot
        action: keep
      - target_label: service_name
        replacement: telegram-vpn-bot
      - source_labels: [__meta_file_sd_label_host_id]
        target_label: node_id
        regex: (.+)
        replacement: ${1}

  - job_name: "alertmanager"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: alertmanager
        action: keep
      - target_label: service_name
        replacement: alertmanager
      - source_labels: [__meta_file_sd_label_host_id]
        target_label: node_id
        regex: (.+)
        replacement: ${1}

  - job_name: "otel-collector"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: otel-collector
        action: keep
      - target_label: service_name
        replacement: otel-collector
      - source_labels: [__meta_file_sd_label_host_id]
        target_label: node_id
        regex: (.+)
        replacement: ${1}

  - job_name: "loki"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service_name: loki

  - job_name: "promtail"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["promtail:9080"]
        labels:
          service_name: promtail

  - job_name: "tempo"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: tempo
        action: keep
      - target_label: service_name
        replacement: tempo
      - source_labels: [__meta_file_sd_label_host_id]
        target_label: node_id
        regex: (.+)
        replacement: ${1}

  - job_name: "wg-exporter"
    metrics_path: /metrics
    scheme: http
    scrape_interval: 3s
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: wg-exporter
        action: keep
      - target_label: service_name
        replacement: wg-exporter
      - source_labels: [__meta_file_sd_label_host_id]
        target_label: node_id
        regex: (.+)
        replacement: ${1}
      - source_labels: [__meta_file_sd_label_node_id]
        target_label: node_id
        regex: (.+)
        replacement: ${1}
      - source_labels: [__meta_file_sd_label_server_id]
        target_label: server_id
        regex: (.+)
        replacement: ${1}
