# Prometheus config for VPN Suite control plane.
# Targets are provided via file_sd (targets.json) generated by ops/discovery.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml
  - /etc/prometheus/alerts/unified-alerts.yml

scrape_configs:
  - job_name: "admin-api"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: admin-api
        action: keep

  - job_name: "cadvisor"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: cadvisor
        action: keep

  - job_name: "node-exporter"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: node-exporter
        action: keep

  - job_name: "node-agent"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: node-agent
        action: keep

  - job_name: "telegram-vpn-bot"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: telegram-vpn-bot
        action: keep

  - job_name: "outline-ss"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: outline-ss
        action: keep

  - job_name: "outline-poller"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: outline-poller
        action: keep

  - job_name: "wg-exporter"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files: ["/etc/prometheus/file_sd/targets.json"]
    relabel_configs:
      - source_labels: ["sd_job"]
        regex: wg-exporter
        action: keep
