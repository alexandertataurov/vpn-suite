# OpenTelemetry Collector — traces, metrics, logs (hot-path, 100ms batch)
# Receives OTLP from admin-api, telegram-vpn-bot (when instrumented).
# Metrics: OTLP push + Prometheus scrape; metrics -> prometheusremotewrite -> VictoriaMetrics
# Logs: OTLP -> Loki. Traces: OTLP -> Tempo.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 448
  probabilistic_sampler:
    sampling_percentage: 50
  batch/fast:
    timeout: 25ms
    send_batch_size: 256

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheusremotewrite/victoriametrics:
    endpoint: http://victoria-metrics:8428/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, probabilistic_sampler, batch/fast]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch/fast]
      exporters: [prometheusremotewrite/victoriametrics]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch/fast]
      exporters: [loki]
