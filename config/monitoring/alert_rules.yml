# Alert rules for VPN Suite. Use with Prometheus Alertmanager.
# Policy: docs/ALERT_POLICY.md
# p95 latency for /api/v1/servers: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{path_template=~"/api/v1/servers.*"}[5m])) by (le, path_template))
groups:
  - name: vpn-suite
    # Minimal launch alert set: control-plane, DB/Redis, schedulable nodes, telemetry pipeline.
    rules:
      - alert: AdminApiDown
        expr: up{job="admin-api"} == 0
        for: 1m
        labels:
          severity: critical
          affected_service: admin-api
        annotations:
          summary: "Admin API is down"
          runbook_url: "https://github.com/your-org/vpn-suite/blob/main/docs/ops/runbook.md"
          dashboard_url: "https://grafana.example.com/d/vpn-overview"

      # Control-plane degraded: readiness failures on /health/ready.
      - alert: AdminApiReadinessFailures
        expr: rate(http_errors_total{path_template="/health/ready", error_type="INTERNAL_ERROR"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          affected_service: admin-api
        annotations:
          summary: "Admin API readiness failures on /health/ready"
          description: "Readiness check is failing for >5m. Check admin-api logs and DB/Redis connectivity."

      # DB / Redis unavailable: derived from readiness and DB health metrics.
      - alert: DbOrRedisUnavailable
        expr: |
          http_errors_total{path_template="/health/ready", error_type="INTERNAL_ERROR"} > 0
        for: 5m
        labels:
          severity: critical
          affected_service: database
        annotations:
          summary: "DB or Redis unavailable according to readiness checks"
          description: "Control-plane readiness failing due to storage dependencies. Check Postgres and Redis containers and logs."

      # No schedulable nodes: vpn_nodes_total absent or no healthy/degraded nodes.
      - alert: VpnNoSchedulableNodes
        expr: absent(vpn_nodes_total) or sum(vpn_nodes_total{status=~"healthy|degraded"}) < 1
        for: 1m
        labels:
          severity: critical
          affected_service: vpn-cluster
        annotations:
          summary: "No healthy/degraded VPN nodes are schedulable"
          description: "Scheduler cannot place new peers. Check node discovery, health, and agent connectivity."
          runbook_url: "https://vpn.vega.llc/docs/ops/runbook.md#vpn-cluster"
          dashboard_url: "https://vpn.vega.llc/grafana/d/vpn-overview"

      # Telemetry pipeline stalled: polling loop not running or snapshots stale.
      - alert: TelemetryPipelineStalled
        expr: |
          increase(telemetry_poll_runs_total[10m]) == 0
          or max(vpn_server_snapshot_staleness_seconds) > 600
        for: 10m
        labels:
          severity: warning
          affected_service: telemetry
        annotations:
          summary: "Telemetry pipeline stalled (no poll runs or snapshots too stale)"
          description: "Telemetry polling loop has not run in 10m or snapshot staleness > 10m. Check telemetry worker logs and Prometheus targets."

      # SLO burn alerts (admin-api)
      # Error budget: 0.5% (99.5% success). Burn rate thresholds: 14.4 (fast) / 6 (slow).
      - alert: AdminApiErrorBudgetBurnFast
        expr: |
          (
            sum(rate(http_requests_total{job="admin-api", status_class="5xx"}[5m]))
            /
            (sum(rate(http_requests_total{job="admin-api"}[5m])) + 1e-9)
          ) / 0.005 > 14.4
        for: 5m
        labels:
          severity: critical
          slo: availability
        annotations:
          summary: "Admin API error budget burn fast (99.5% SLO)"
          description: "Fast-burn: 5m window exceeds 14.4x budget. Investigate spikes and recent deploys."

      - alert: AdminApiErrorBudgetBurnSlow
        expr: |
          (
            sum(rate(http_requests_total{job="admin-api", status_class="5xx"}[30m]))
            /
            (sum(rate(http_requests_total{job="admin-api"}[30m])) + 1e-9)
          ) / 0.005 > 6
        for: 30m
        labels:
          severity: warning
          slo: availability
        annotations:
          summary: "Admin API error budget burn slow (99.5% SLO)"
          description: "Slow-burn: 30m window exceeds 6x budget. Investigate sustained error rate."

      # Latency SLO: 99% of requests under 1s (error budget 1%).
      - alert: AdminApiLatencyBudgetBurnFast
        expr: |
          (
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job="admin-api", le="1"}[5m]))
              /
              sum(rate(http_request_duration_seconds_bucket{job="admin-api", le="+Inf"}[5m]))
            )
          ) / 0.01 > 14.4
        for: 5m
        labels:
          severity: critical
          slo: latency
        annotations:
          summary: "Admin API latency budget burn fast (99% <1s)"
          description: "Fast-burn: 5m window exceeds 14.4x latency budget. Check DB/cache saturation."

      - alert: AdminApiLatencyBudgetBurnSlow
        expr: |
          (
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job="admin-api", le="1"}[30m]))
              /
              sum(rate(http_request_duration_seconds_bucket{job="admin-api", le="+Inf"}[30m]))
            )
          ) / 0.01 > 6
        for: 30m
        labels:
          severity: warning
          slo: latency
        annotations:
          summary: "Admin API latency budget burn slow (99% <1s)"
          description: "Slow-burn: 30m window exceeds 6x latency budget. Investigate regressions."

      - alert: FrontendLcpP75High
        expr: |
          histogram_quantile(
            0.75,
            sum(rate(frontend_web_vital_ms_bucket{name="LCP"}[10m])) by (le, app, route, name)
          ) > 2500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Frontend LCP p75 > 2.5s"
          description: "LCP p75 for {{ $labels.app }} {{ $labels.route }} is above 2.5s (name={{ $labels.name }})."

      - alert: FrontendInpP75High
        expr: |
          histogram_quantile(
            0.75,
            sum(rate(frontend_web_vital_ms_bucket{name="INP"}[10m])) by (le, app, route, name)
          ) > 200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Frontend INP p75 > 200ms"
          description: "INP p75 for {{ $labels.app }} {{ $labels.route }} is above 200ms (name={{ $labels.name }})."

      - alert: FrontendClsP75High
        expr: |
          histogram_quantile(
            0.75,
            sum(rate(frontend_web_vital_score_bucket{name="CLS"}[10m])) by (le, app, route, name)
          ) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Frontend CLS p75 > 0.1"
          description: "CLS p75 for {{ $labels.app }} {{ $labels.route }} is above 0.1 (name={{ $labels.name }})."

      - alert: FrontendTtfbP75High
        expr: |
          histogram_quantile(
            0.75,
            sum(rate(frontend_web_vital_ms_bucket{name="TTFB"}[10m])) by (le, app, route, name)
          ) > 800
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Frontend TTFB p75 > 800ms"
          description: "TTFB p75 for {{ $labels.app }} {{ $labels.route }} is above 800ms (name={{ $labels.name }})."

      - alert: FrontendFcpP75High
        expr: |
          histogram_quantile(
            0.75,
            sum(rate(frontend_web_vital_ms_bucket{name="FCP"}[10m])) by (le, app, route, name)
          ) > 1800
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Frontend FCP p75 > 1.8s"
          description: "FCP p75 for {{ $labels.app }} {{ $labels.route }} is above 1.8s (name={{ $labels.name }})."

      - alert: VpnNoSchedulableNodes
        expr: absent(vpn_nodes_total) or sum(vpn_nodes_total{status=~"healthy|degraded"}) < 1
        for: 1m
        labels:
          severity: critical
          affected_service: vpn-cluster
        annotations:
          summary: "No healthy/degraded VPN nodes are schedulable"
          description: "Scheduler cannot place new peers. Check node discovery, health, and agent connectivity."
          runbook_url: "https://vpn.vega.llc/docs/ops/runbook.md#vpn-cluster"
          dashboard_url: "https://vpn.vega.llc/grafana/d/vpn-overview"

      # 0.4 aligns with node-agent "degraded" floor (0.45); below 0.4 is truly unhealthy
      - alert: VpnNodeHealthLow
        expr: vpn_node_health < 0.4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VPN node health is below 0.4"
          runbook_url: "https://vpn.vega.llc/docs/ops/runbook.md"
          dashboard_url: "https://vpn.vega.llc/grafana/d/vpn-overview"

      - alert: VpnNodeUnhealthy
        expr: sum(vpn_nodes_total{status="unhealthy"}) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "At least one VPN node is unhealthy"
          runbook_url: "https://vpn.vega.llc/docs/ops/runbook.md"
          dashboard_url: "https://vpn.vega.llc/grafana/d/vpn-overview"

      - alert: VpnClusterLoadHigh
        expr: vpn_cluster_load_index > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "VPN cluster load index is above 0.85"

      - alert: VpnReconciliationFailures
        expr: increase(vpn_reconciliation_runs_total{status="failure"}[10m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "VPN reconciliation loop has failures in the last 10 minutes"

      - alert: VpnReconciliationStalled
        expr: increase(vpn_reconciliation_runs_total{status="success"}[15m]) < 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "VPN reconciliation loop has not completed successfully in 15 minutes"

      # Server offline: no heartbeat (when using agent; requires agent to expose or CP to push last_seen metric)
      - alert: VpnServerOffline
        expr: (time() - vpn_node_last_seen_seconds) > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VPN server has not reported heartbeat in 5+ minutes"
        # Note: requires vpn_node_last_seen_seconds from control-plane or agent. If absent, disable or use Redis-based check.

      # Handshake freshness: node-agent exposes agent_last_handshake_max_age_seconds.
      # 2h threshold reduces noise for idle peers (no WireGuard keepalive); tune in ERRORS_TG.md plan.
      - alert: VpnHandshakeFreshnessCollapse
        expr: agent_last_handshake_max_age_seconds > 7200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "VPN node handshake max age > 2h (peers may appear offline)"
          runbook_url: "https://vpn.vega.llc/docs/ops/runbook.md"
          dashboard_url: "https://vpn.vega.llc/grafana/d/vpn-overview"
        # Note: only when node-agent /metrics is scraped by Prometheus.

      # State reconciliation: peers expected (from DB) exceed peers present (from wg show)
      - alert: VpnPeersDrift
        expr: (vpn_peers_expected - vpn_peers_present) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VPN peers expected minus present > 0 on node (reconcile drift or failure)"
          description: "Node {{ $labels.node_id }} has fewer peers on wireguard than in DB. Check reconcile loop and node reachability."

      - alert: VpnPeersAllMissing
        expr: vpn_peers_present == 0 and vpn_peers_expected > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "All peers disappeared from node (vpn_peers_present=0 but DB still expects peers)"
          description: "Node {{ $labels.node_id }} has zero peers on wireguard while DB reports active devices. Investigate control-plane reconciliation or unexpected peer pruning."

      # Devices marked NO_HANDSHAKE (no handshake within quality gate after apply)
      - alert: VpnDevicesNoHandshake
        expr: vpn_devices_no_handshake > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "One or more devices have no handshake within gate (check endpoint, firewall, NAT)"
          description: "{{ $value }} device(s) in NO_HANDSHAKE state. See docs/ops/no-traffic-troubleshooting.md"

      - alert: VpnPeersGhost
        expr: vpn_peers_ghost_count > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Peers on node not in DB (ghost/orphan)"
          description: "Node {{ $labels.node_id }} has {{ $value }} peer(s) on wireguard not in DB. Consider reconcile_remove_orphans or investigate."

      - alert: VpnPeersExpiredActive
        expr: vpn_peers_expired_active_count > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Expired (revoked) peers still present on node"
          description: "Node {{ $labels.node_id }} has {{ $value }} revoked device(s) still on wireguard. Reconcile should remove them."

  - name: admin-operator
    rules:
      - alert: AdminIssuanceFailuresRepeated
        expr: increase(vpn_admin_issue_total{status="failure"}[10m]) >= 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Repeated admin peer issuance failures in the last 10 minutes"
          description: "May indicate server unreachable or node errors. Check admin-api logs and request_id."

      - alert: AdminIssuanceFailureRateHigh
        expr: |
          sum(rate(vpn_admin_issue_total{status="failure"}[5m]))
          /
          (sum(rate(vpn_admin_issue_total[5m])) + 1) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Admin issuance failure rate above 50% (server unreachable or errors)"

      - alert: ConfigDownloadFailureSpike
        expr: rate(vpn_config_download_total{status=~"not_found|expired|decrypt_error|already_used"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Config download/QR failure rate spike (invalid or expired tokens, or decryption errors)"

      - alert: AuthFailuresSpike
        expr: sum(rate(auth_failures_total[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Auth failure rate spike (possible brute-force or credential stuffing)"

      - alert: PaymentWebhookFailureRate
        expr: |
          sum(rate(payment_webhook_total{status="failed"}[5m]))
          /
          (sum(rate(payment_webhook_total[5m])) + 1) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Payment webhook failure rate above 20%"

      - alert: ProvisionFailureSpike
        expr: sum(rate(provision_failures_total[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Provisioning failure rate spike (issue/rotate failures)"

  - name: docker-telemetry
    rules:
      - alert: OtelReceiverRefusedSpans
        expr: sum(rate(otelcol_receiver_refused_spans[5m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "OTel collector is refusing spans"
          description: "Collector backpressure is dropping spans. Check otel-collector memory and sampling."

      - alert: LokiRequestErrors
        expr: sum(rate(loki_request_errors_total[5m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Loki is returning request errors"
          description: "Loki query/push errors detected. Check Loki health and storage."

      - alert: PromtailDroppedEntries
        expr: sum(rate(promtail_client_dropped_entries_total[5m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Promtail dropped log entries"
          description: "Promtail is dropping log entries; log pipeline is losing data."

      - alert: DockerContainerHighCPUWarning
        expr: sum by (id, name) (rate(container_cpu_usage_seconds_total{container_label_com_docker_compose_project="vpn-suite"}[5m])) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container CPU usage is above 85%"

      - alert: DockerContainerHighCPUCritical
        expr: sum by (id, name) (rate(container_cpu_usage_seconds_total{container_label_com_docker_compose_project="vpn-suite"}[5m])) * 100 > 95
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Container CPU usage is above 95%"

      - alert: DockerContainerHighMemoryWarning
        expr: (sum by (id, name) (container_memory_working_set_bytes{container_label_com_docker_compose_project="vpn-suite"}) / clamp_min(sum by (id, name) (container_spec_memory_limit_bytes{container_label_com_docker_compose_project="vpn-suite"}), 1)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container memory usage is above 90%"

      - alert: DockerContainerHighMemoryCritical
        expr: (sum by (id, name) (container_memory_working_set_bytes{container_label_com_docker_compose_project="vpn-suite"}) / clamp_min(sum by (id, name) (container_spec_memory_limit_bytes{container_label_com_docker_compose_project="vpn-suite"}), 1)) * 100 > 97
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Container memory usage is above 97%"

      - alert: DockerContainerRestartLoop
        expr: increase(docker_container_restart_count[5m]) > 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container restart loop detected"

      - alert: DockerContainerUnhealthy
        expr: docker_container_health_status == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container reported unhealthy status"

      # Host memory/swap pressure — lag can cause connection drops; restart often fixes
      - alert: NodeMemoryPressure
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory pressure (>90% used)"
          description: "Lag may cause connection drops. Consider: add RAM, tune swap, or restart stack. See docs/security/incident-response-runbook.md 'Server lag'."
          runbook_url: "https://vpn.vega.llc/docs/security/incident-response-runbook.md#server-lag"
          dashboard_url: "https://vpn.vega.llc/grafana/d/vpn-suite-observability"

      - alert: NodeSwapHeavy
        expr: (1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) > 0.7 and node_memory_SwapTotal_bytes > 2e9
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Host swap heavily used (>50%, >1GB)"
          description: "Memory pressure; lag and connection drops likely. Add RAM or reduce swap usage. See docs/security/incident-response-runbook.md 'Server lag'."
          runbook_url: "https://vpn.vega.llc/docs/security/incident-response-runbook.md#server-lag"
          dashboard_url: "https://vpn.vega.llc/grafana/d/vpn-suite-observability"

      - alert: DockerHostDiskPressure
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / clamp_min(node_filesystem_size_bytes{mountpoint="/"}, 1)) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host disk pressure on root filesystem (disk near full)"
          description: "Less than 15% disk space available on root. Postgres may PANIC with 'No space left on device'. Free space: docker system prune, remove old backups. See docs/ops/runbook.md 'Postgres PANIC'."

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / clamp_min(node_filesystem_size_bytes{mountpoint="/"}, 1)) < 0.05
        for: 5m
        labels:
          severity: critical
          affected_service: postgres
        annotations:
          summary: "Host disk critical (<5% free)"
          description: "Postgres and other services may fail. Immediate: df -h; docker system prune -af; rotate logs."

      # Cert expiring: optional; requires control-plane to expose cert_expiry_timestamp_seconds or similar
      # - alert: AgentCertExpiringSoon
      #   expr: (agent_cert_expiry_timestamp_seconds - time()) < 86400 * 7
      #   for: 0m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: "Agent mTLS cert expires in less than 7 days"

  - name: business
    rules:
      - alert: RevenueDrop
        expr: vpn_revenue_mrr > 0 and vpn_revenue_mrr < (max_over_time(vpn_revenue_mrr[7d]) * 0.85)
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "MRR dropped more than 15% vs 7d max"
          description: "Current MRR {{ $value }} is below 85% of 7d max. Server ID: {{ or $labels.server_id \"N/A\" }}."

      - alert: PaymentFailureSpike
        expr: |
          sum(rate(payment_webhook_total{status="failed"}[15m])) / (sum(rate(payment_webhook_total[15m])) + 1) > 0.2
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Payment webhook failure rate above 20%"

      - alert: RenewalRateDrop
        expr: vpn_revenue_renewal_rate < 50 and vpn_revenue_subscriptions_active > 10
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "Renewal rate below 50% (active subs > 10)"

  - name: infrastructure-extra
    rules:
      - alert: HighNodeCpu5m
        expr: (100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CPU > 85% for 5 min on {{ $labels.instance }}"
          description: "Node {{ or $labels.node_id \"N/A\" }}. Value: {{ $value }}%."

      - alert: WireguardHandshakeStaleSpike
        expr: wireguard_peers > 0 and (wireguard_peers_handshake_stale_count / wireguard_peers) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "More than 20% of peers have stale handshake (>5m)"
          description: "Server ID: {{ or $labels.server_id \"N/A\" }}."

      - alert: WgExporterNodeNotDiscovered
        expr: absent(up{job="wg-exporter"}) and count(up{job="admin-api"}) >= 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "No wg-exporter targets discovered (expected when no VPN nodes)"

  - name: application
    rules:
      - alert: ProvisioningErrorRateHigh
        expr: |
          sum(rate(provision_failures_total[10m])) / (sum(rate(vpn_admin_issue_total[10m])) + 1) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Provisioning error rate above 5%"

      - alert: DbLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(db_time_per_request_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "DB P95 latency per request > 1s"
