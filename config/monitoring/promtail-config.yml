server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # Persist positions across restarts; otherwise promtail may re-ingest the entire docker log history
  # and overwhelm loki (leading to long pushes and context-canceled 500s).
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    timeout: 10s
    batchwait: 200ms
    batchsize: 262144
    backoff_config:
      min_period: 500ms
      max_period: 5s
      max_retries: 20

scrape_configs:
  - job_name: docker-containers
    static_configs:
      - targets: [localhost]
        labels:
          job: docker-containers
          __path__: /var/lib/docker/containers/*/*-json.log
