# VPN Suite Alertmanager. P1 (critical) -> PagerDuty + Slack; P2 (warning) -> Slack only.
# Set runbook_url, dashboard_url, affected_service in alert rules.
# Env: ALERTMANAGER_SLACK_WEBHOOK_URL, PAGERDUTY_KEY, ALERTMANAGER_TELEGRAM_*.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "job", "server_id", "node_id"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: p1
      continue: true
    - match:
        severity: warning
      receiver: p2

receivers:
  - name: default
    # No-op; use for dev or when no integrations configured.

  - name: p1
    # P1: error rate >1%, critical failures -> PagerDuty + Slack
    slack_configs:
      - api_url: ${ALERTMANAGER_SLACK_WEBHOOK_URL}
        channel: ${ALERTMANAGER_SLACK_CHANNEL_CRITICAL:-#alerts-critical}
        send_resolved: true
        title: '[P1] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }} — {{ .Annotations.description }}{{ end }}'
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_KEY}
        severity: critical
        send_resolved: true
        description: '{{ .GroupLabels.alertname }}'
        details:
          summary: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
          description: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
          runbook: '{{ range .Alerts }}{{ .Annotations.runbook_url }}{{ end }}'
          dashboard: '{{ range .Alerts }}{{ .Annotations.dashboard_url }}{{ end }}'

  - name: p2
    # P2: warning -> Slack only
    slack_configs:
      - api_url: ${ALERTMANAGER_SLACK_WEBHOOK_URL}
        channel: ${ALERTMANAGER_SLACK_CHANNEL_WARNING:-#alerts}
        send_resolved: true
        title: '[P2] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }} — {{ .Annotations.description }}{{ end }}'

inhibit_rules:
  # When Admin API is down, do not also fire ScrapeTargetDown for admin-api (redundant).
  - source_match:
      alertname: AdminApiDown
    target_match:
      alertname: ScrapeTargetDown
    equal: ["job", "instance"]
  - source_match:
      alertname: AdminApiDown
    target_match:
      alertname: PrometheusTargetDown
    equal: ["job", "instance"]
  # SLO fast burn suppresses slow burn.
  - source_match:
      alertname: AdminApiErrorBudgetBurnFast
    target_match:
      alertname: AdminApiErrorBudgetBurnSlow
    equal: ["job"]
  - source_match:
      alertname: AdminApiLatencyBudgetBurnFast
    target_match:
      alertname: AdminApiLatencyBudgetBurnSlow
    equal: ["job"]
  - source_match:
      alertname: PaymentsErrorBudgetBurnFast
    target_match:
      alertname: PaymentsErrorBudgetBurnSlow
    equal: ["job"]
  - source_match:
      alertname: ProvisioningErrorBudgetBurnFast
    target_match:
      alertname: ProvisioningErrorBudgetBurnSlow
    equal: ["job"]
