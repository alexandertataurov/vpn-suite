# VPN Suite Alertmanager. Configure receivers via environment or override this file.
# Telegram: set ALERTMANAGER_TELEGRAM_BOT_TOKEN, ALERTMANAGER_TELEGRAM_CHAT_ID (or use default receiver).
# Slack: set ALERTMANAGER_SLACK_WEBHOOK_URL. Email: set SMTP_* and use email receiver.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "job", "server_id", "node_id"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical
      continue: true
    - match:
        severity: warning
      receiver: warning

receivers:
  - name: default
    # No-op; use for dev or when no integrations configured.

  - name: critical
    # Route critical alerts (e.g. Telegram + Slack). Configure in override or via env.
    # Example Telegram (use alertmanager Telegram integration or bot):
    #   telegram_configs:
    #     - bot_token: ${ALERTMANAGER_TELEGRAM_BOT_TOKEN}
    #       chat_id: ${ALERTMANAGER_TELEGRAM_CHAT_ID}
    # Example Slack:
    #   slack_configs:
    #     - api_url: ${ALERTMANAGER_SLACK_WEBHOOK_URL}
    #       channel: '#alerts'
    #       send_resolved: true
    #       title: '{{ .GroupLabels.alertname }}'
    #       text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: warning
    # Route warning alerts (e.g. Slack only). Same pattern as critical.

inhibit_rules:
  # When Admin API is down, do not also fire ScrapeTargetDown for admin-api (redundant).
  - source_match:
      alertname: AdminApiDown
    target_match:
      alertname: ScrapeTargetDown
    equal: ["job", "instance"]
  - source_match:
      alertname: AdminApiDown
    target_match:
      alertname: PrometheusTargetDown
    equal: ["job", "instance"]
