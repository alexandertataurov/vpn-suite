# Unified observability alert group. See docs/observability/ALERT_SPEC.md.
groups:
  - name: unified-observability
    rules:
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Target down: {{ $labels.job }}"
          description: "Prometheus target is down for 5 minutes."

      - alert: HighNodeCpu
        expr: (100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage > 85% for 10 minutes."

      - alert: HighNodeMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.instance }}"
          description: "Memory usage > 90% for 10 minutes."

      - alert: VpnHandshakeAgeHigh
        expr: agent_last_handshake_max_age_seconds > 1800
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "VPN handshake age high"
          description: "Max handshake age > 30 minutes."
          runbook_url: "https://vpn.vega.llc/docs/ops/runbook.md"
          dashboard_url: "https://vpn.vega.llc/grafana/d/vpn-overview"

      - alert: VpnPeersDrop
        expr: (agent_peers_active == 0) and (agent_peers_runtime > 0)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "VPN peers inactive"
          description: "Peers exist but none active for 10 minutes."

      - alert: AuthFailureSpike
        expr: rate(auth_failures_total[15m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Auth failure rate spike"
          description: "Auth failures > 0.1/s for 10 minutes. Check for brute force or misconfiguration."
          runbook_url: "https://github.com/vpn-suite/vpn-suite/blob/main/docs/ops/runbook.md"

      - alert: ReferralAttachFailuresSpike
        expr: rate(referral_attach_fail_total[1h]) > 0.05
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Referral attach failure rate elevated"
          description: "Referral attach failures > 0.05/s for 30 minutes. Check referral codes and referrer lookup."

      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres exporter down"
          description: "Postgres exporter target down for 5 minutes."

      - alert: RedisExporterDown
        expr: up{job="redis"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis exporter down"
          description: "Redis exporter target down for 5 minutes."
