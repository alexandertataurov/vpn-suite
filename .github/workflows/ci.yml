name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    defaults:
      run:
        working-directory: apps/admin-api

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vpn_admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vpn_admin
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-min-32-chars-long
      ADMIN_EMAIL: admin@ci
      ADMIN_PASSWORD: ci-admin-password
      RUN_E2E: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('apps/admin-api/requirements*.txt') }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy app

      - name: pip-audit
        continue-on-error: true
        run: pip-audit -r requirements.txt

      - name: Migrate
        run: python -m alembic upgrade head

      - name: Migration integrity (downgrade/upgrade)
        run: |
          set -euo pipefail
          python -m alembic downgrade -1
          python -m alembic upgrade head

      - name: Alembic check
        continue-on-error: true
        run: python -m alembic check

      - name: Seed admin
        run: python scripts/seed_admin.py

      - name: Pytest
        run: pytest tests/ --cov=app --cov-report=term-missing -v

  build:
    needs: [lint-test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build admin-api image (with layer cache)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/admin-api
          file: ./apps/admin-api/Dockerfile
          push: false
          load: true
          tags: vpn-suite-admin-api:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    needs: [lint-test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build admin-api for scan
        env:
          PUBLIC_DOMAIN: ci.invalid
        run: |
          set -euo pipefail
          docker buildx create --use --driver docker-container || true  # reuse existing builder if present
          docker buildx build --load \
            --cache-from type=gha --cache-to type=gha,mode=max \
            -f apps/admin-api/Dockerfile -t vpn-suite-admin-api ./apps/admin-api
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: vpn-suite-admin-api
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  frontend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Design system check (miniapp)
        run: pnpm run guardrails

      - name: Unit tests (shared)
        run: pnpm test -- --run

      - name: Production build (admin + miniapp)
        env:
          VITE_SENTRY_RELEASE: ${{ github.sha }}
          VITE_SENTRY_ENV: ci
          VITE_SENTRY_SOURCEMAPS: ${{ vars.SENTRY_UPLOAD_ENABLED == 'true' && '1' || '0' }}
          VITE_POSTHOG_KEY: ""
          VITE_POSTHOG_HOST: https://eu.i.posthog.com
          VITE_FARO_COLLECTOR_URL: ""
          VITE_ANALYTICS_ENABLED: "0"
        run: pnpm run build

      - name: Upload Sentry sourcemaps (admin)
        if: ${{ vars.SENTRY_UPLOAD_ENABLED == 'true' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) }}
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_ADMIN }}
        with:
          environment: ci
          version: ${{ github.sha }}
          sourcemaps: apps/admin-web/dist
          url_prefix: "~/admin"
          set_commits: "skip"

      - name: Upload Sentry sourcemaps (miniapp)
        if: ${{ vars.SENTRY_UPLOAD_ENABLED == 'true' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) }}
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_MINIAPP }}
        with:
          environment: ci
          version: ${{ github.sha }}
          sourcemaps: apps/miniapp/dist
          url_prefix: "~/webapp"
          set_commits: "skip"

      - name: Record bundle size (baseline)
        run: |
          set -euo pipefail
          mkdir -p reports/ci
          du -sb apps/admin-web/dist | tee reports/ci/dist-size-admin.txt
          du -sb apps/miniapp/dist | tee reports/ci/dist-size-miniapp.txt
          echo "Bundle size (admin): $(cat reports/ci/dist-size-admin.txt)"
          echo "Bundle size (miniapp): $(cat reports/ci/dist-size-miniapp.txt)"

      - name: Upload bundle size artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-size
          path: |
            reports/ci/dist-size-admin.txt
            reports/ci/dist-size-miniapp.txt

      - name: Install Chromium (Playwright)
        working-directory: apps/admin-web
        run: pnpm exec playwright install chromium --with-deps

      - name: Serve admin for Lighthouse
        run: |
          set -euo pipefail
          mkdir -p .serve/admin
          cp -r apps/admin-web/dist/* .serve/admin/
          npx serve -s .serve -l 4173 &
          for i in $(seq 1 15); do curl -sf http://127.0.0.1:4173/admin/ > /dev/null && break; sleep 1; done
          curl -sf http://127.0.0.1:4173/admin/ > /dev/null || { echo "Serve did not become ready"; exit 1; }

      - name: Lighthouse accessibility
        run: |
          CHROME_PATH=$(find $HOME/.cache/ms-playwright -name chrome -path '*/chrome-linux/chrome' 2>/dev/null | head -1)
          echo "CHROME_PATH=$CHROME_PATH"
          npx lighthouse http://127.0.0.1:4173/admin/ --only-categories=accessibility --output=json --output-path=apps/admin-web/lighthouse-a11y.json --chrome-flags="--headless --no-sandbox --disable-gpu" --quiet
          node -e "
            const fs = require('fs');
            const p = 'apps/admin-web/lighthouse-a11y.json';
            if (!fs.existsSync(p)) { console.error('Lighthouse report not found'); process.exit(1); }
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            const s = j.categories?.accessibility?.score;
            console.log('Accessibility score:', s);
            if (s == null) { console.error('No accessibility score'); process.exit(1); }
            process.exit(s >= 0.9 ? 0 : 1);
          "

      - name: Storybook build (admin)
        working-directory: frontend
        run: pnpm --filter admin run build-storybook

      - name: Storybook test runner (admin)
        timeout-minutes: 8
        continue-on-error: true
        working-directory: frontend
        run: |
          set -euo pipefail
          pnpm run storybook:admin -- --ci --no-open --host 127.0.0.1 --port 6006 &
          for i in $(seq 1 90); do
            curl -sf http://127.0.0.1:6006/ > /dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:6006/ > /dev/null || { echo "Storybook did not become ready"; exit 1; }
          pnpm --filter admin run storybook:test

      - name: Storybook guardrails (admin)
        working-directory: frontend
        run: pnpm --filter admin run storybook:guardrails

      - name: Script preflight
        run: chmod +x tools/quality/check-tokens.sh

      - name: Token compliance (no raw hex)
        run: bash tools/quality/check-tokens.sh

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-e2e:
    needs: [lint-test, frontend-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vpn_admin
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-min-32-chars-long
      ADMIN_EMAIL: admin@ci
      ADMIN_PASSWORD: ci-admin-password
      PLAYWRIGHT_BASE_URL: http://localhost:5174/admin

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vpn_admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('apps/admin-api/requirements*.txt') }}

      - name: Backend deps and migrate
        working-directory: apps/admin-api
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m alembic upgrade head

      - name: Seed admin
        working-directory: apps/admin-api
        run: python scripts/seed_admin.py

      - name: Start API
        working-directory: apps/admin-api
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vpn_admin
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret-key-min-32-chars-long
          ADMIN_EMAIL: admin@ci
          ADMIN_PASSWORD: ci-admin-password

      - name: Wait for API
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && exit 0
            sleep 1
          done
          echo "API did not become ready"
          exit 1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/admin-web
        run: pnpm exec playwright install chromium --with-deps

      - name: Start admin dev server
        working-directory: frontend
        run: pnpm run dev:admin &
        env:
          CI: ""

      - name: Wait for admin
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            curl -sf http://localhost:5174/admin/ && exit 0
            sleep 1
          done
          echo "Admin dev server did not become ready"
          exit 1

      - name: Script preflight
        run: chmod +x scripts/release_api_happy_path.sh

      - name: API contract (happy path)
        continue-on-error: true
        run: bash scripts/release_api_happy_path.sh
        env:
          BASE_URL: http://127.0.0.1:8000
          ADMIN_EMAIL: admin@ci
          ADMIN_PASSWORD: ci-admin-password

      - name: Run E2E
        working-directory: frontend
        run: pnpm run test:e2e:ci
        env:
          CI: "true"
          ADMIN_EMAIL: admin@ci
          ADMIN_PASSWORD: ci-admin-password

  bot-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/telegram-bot
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-bot-${{ runner.os }}-${{ hashFiles('apps/telegram-bot/requirements*.txt') }}
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Pytest
        run: pytest tests/ --cov=. --cov-report=term-missing -v
