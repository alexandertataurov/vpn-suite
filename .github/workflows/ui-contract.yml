name: UI Contract

on:
  pull_request:
    paths:
      - "apps/miniapp/src/**"
      - "apps/miniapp/.storybook/**"
      - "apps/miniapp/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/ui-contract.yml"
      - ".github/pull_request_template.md"
      - "docs/storybook-ai-contract.md"
      - "docs/ai-ui-workflow.md"
      - ".cursor/rules/storybook-ui.mdc"

jobs:
  storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter miniapp run typecheck

      - name: Design Check
        run: pnpm run guardrails

      - name: Storybook Contract Inventory
        run: pnpm run storybook:contract:miniapp

      - name: Build Storybook
        run: pnpm run build-storybook:miniapp

      - name: Storybook Contract Tests
        run: pnpm run test-storybook:miniapp

      - name: Storybook Official Runner Probe
        continue-on-error: true
        run: pnpm run test-storybook:official:miniapp

  chromatic:
    needs: storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Chromatic
        continue-on-error: true
        run: pnpm --filter miniapp run chromatic -- --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}
