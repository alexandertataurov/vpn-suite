name: UI Contract

on:
  pull_request:
    paths:
      - "frontend/miniapp/src/**"
      - "frontend/miniapp/.storybook/**"
      - "frontend/miniapp/package.json"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/ui-contract.yml"
      - ".github/pull_request_template.md"
      - "docs/storybook-ai-contract.md"
      - "docs/ai-ui-workflow.md"
      - ".cursor/rules/storybook-ui.mdc"

jobs:
  storybook:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -w miniapp

      - name: Design Check
        run: npm run design:check -w miniapp

      - name: Storybook Contract Inventory
        run: npm run storybook:contract -w miniapp

      - name: Build Storybook
        run: npm run build-storybook -w miniapp

      - name: Storybook Contract Tests
        run: npm run test-storybook -w miniapp

      - name: Storybook Official Runner Probe
        continue-on-error: true
        run: npm run test-storybook:official -w miniapp

  chromatic:
    if: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
    needs: storybook
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Chromatic
        run: npm run chromatic -w miniapp -- --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}
