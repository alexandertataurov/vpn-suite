name: Frontend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck (miniapp)
        run: npm run typecheck -w miniapp

      - name: Typecheck (admin)
        run: npm run typecheck -w admin

      - name: Lint (miniapp)
        run: npm run lint -w miniapp

      - name: Lint (admin)
        run: npm run lint -w admin

      - name: Build
        env:
          VITE_POSTHOG_KEY: ""
          VITE_POSTHOG_HOST: https://eu.i.posthog.com
          VITE_FARO_COLLECTOR_URL: ""
          VITE_ANALYTICS_ENABLED: "0"
        run: npm run build
