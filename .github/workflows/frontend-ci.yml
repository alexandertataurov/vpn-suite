name: Frontend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck (miniapp)
        run: pnpm --filter miniapp run typecheck

      - name: Typecheck (admin)
        run: pnpm --filter admin run typecheck

      - name: Lint (miniapp)
        run: pnpm --filter miniapp run lint

      - name: Lint (admin)
        run: pnpm --filter admin run lint

      - name: Build
        env:
          VITE_POSTHOG_KEY: ""
          VITE_POSTHOG_HOST: https://eu.i.posthog.com
          VITE_FARO_COLLECTOR_URL: ""
          VITE_ANALYTICS_ENABLED: "0"
        run: pnpm run build
