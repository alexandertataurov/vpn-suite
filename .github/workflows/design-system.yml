name: Design System Integrity

on: [pull_request]

jobs:
  lint-design-system:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Miniapp design check
        run: pnpm run guardrails

      - name: No hardcoded colors (miniapp)
        run: |
          set -euo pipefail
          COUNT=$( (test -d apps/miniapp/src/components && grep -rn "#[0-9a-fA-F]\{3,8\}" apps/miniapp/src/components --include="*.tsx" --include="*.ts" || true; \
            test -d apps/miniapp/src/pages && grep -rn "#[0-9a-fA-F]\{3,8\}" apps/miniapp/src/pages --include="*.tsx" --include="*.ts" || true ) \
            | grep -vE '^[[:space:]]*//|^[[:space:]]*\*|^[[:space:]]*/\*' | wc -l) || true
          COUNT=${COUNT:-0}
          [ "$COUNT" -eq 0 ] || (echo "❌ $COUNT hardcoded colors found in miniapp" && exit 1)

      - name: No hardcoded colors (admin)
        run: |
          set -euo pipefail
          COUNT=$(grep -rn "#[0-9a-fA-F]\{3,8\}" apps/admin-web/src \
            --include="*.tsx" --include="*.ts" \
            | grep -v '\.stories\.' \
            | grep -vE '^[[:space:]]*//|^[[:space:]]*\*|^[[:space:]]*/\*' | wc -l) || true
          COUNT=${COUNT:-0}
          [ "$COUNT" -eq 0 ] || (echo "❌ $COUNT hardcoded colors found in admin" && exit 1)

      - name: No hardcoded colors (shared)
        run: |
          set -euo pipefail
          COUNT=$(grep -rn "#[0-9a-fA-F]\{3,8\}" apps/shared-web/src \
            --include="*.tsx" --include="*.ts" 2>/dev/null \
            | grep -vE '^[[:space:]]*//|^[[:space:]]*\*|^[[:space:]]*/\*' | wc -l || true)
          [ "${COUNT:-0}" -eq 0 ] || (echo "❌ $COUNT hardcoded colors found in shared" && exit 1)

      - name: No direct lucide imports
        run: |
          set -euo pipefail
          COUNT=$(grep -rn "from 'lucide-react'\|from \"lucide-react\"" apps/miniapp/src \
            --include="*.tsx" --include="*.ts" | grep -vE "/lib/icons\.ts|design-system/icons" | wc -l) || true
          COUNT=${COUNT:-0}
          [ "$COUNT" -eq 0 ] || (echo "❌ $COUNT direct lucide imports found" && exit 1)

      - name: No inline styles (miniapp)
        run: |
          set -euo pipefail
          COUNT=$( (test -d apps/miniapp/src/components && grep -rn "style={{" apps/miniapp/src/components --include="*.tsx" || true; \
            test -d apps/miniapp/src/pages && grep -rn "style={{" apps/miniapp/src/pages --include="*.tsx" || true ) | wc -l) || true
          COUNT=${COUNT:-0}
          [ "$COUNT" -eq 0 ] || (echo "❌ $COUNT inline styles found in miniapp" && exit 1)

      - name: No inline styles (admin)
        run: |
          set -euo pipefail
          COUNT=$(grep -rn "style={{" apps/admin-web/src --include="*.tsx" 2>/dev/null | grep -v -E 'styleguide|design-system' | wc -l) || true
          COUNT=${COUNT:-0}
          [ "$COUNT" -eq 0 ] || (echo "❌ $COUNT inline styles found in admin (excluding styleguide/design-system)" && exit 1)

      - name: No inline styles (shared)
        run: |
          set -euo pipefail
          COUNT=$(grep -rn "style={{" apps/shared-web/src --include="*.tsx" 2>/dev/null | wc -l) || true
          [ "${COUNT:-0}" -eq 0 ] || (echo "❌ $COUNT inline styles found in shared" && exit 1)

      - name: Single token source
        run: |
          set -euo pipefail
          COUNT=$(grep -rln "^:root" apps/miniapp/src --include="*.css" | wc -l)
          [ "$COUNT" -eq 1 ] || (echo "❌ $COUNT :root files found (expected 1)" && exit 1)

      - name: TypeScript
        run: pnpm --filter miniapp run typecheck
