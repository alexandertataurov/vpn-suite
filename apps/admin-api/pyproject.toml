[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501", "UP017"]  # UP017: datetime.UTC is 3.11+

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
# SQLAlchemy: forward refs Mapped["Role"] required (circular import)
"app/models/*.py" = ["F821", "UP037"]
# Scripts: sys.path/path manipulation before app imports
"scripts/*.py" = ["E402"]
# Core/services: #region blocks put imports after region start
"app/core/server_sync_loop.py" = ["E402"]
"app/services/server_sync_service.py" = ["E402", "I001"]  # I001: single merged snapshot import block
"alembic/versions/049_one_time_download_tokens.py" = ["I001"]
"app/api/public_download.py" = ["I001"]
"app/core/amnezia_vpn_key.py" = ["I001"]
"app/core/one_time_download.py" = ["I001"]
"app/main.py" = ["I001"]
[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true
# SQLAlchemy relationship forward refs (circular imports)
[[tool.mypy.overrides]]
module = "app.models.*"
disable_error_code = ["name-defined", "no-redef"]

# TODO: tighten types; temporary so CI passes
[[tool.mypy.overrides]]
module = [
  "app.services.docker_telemetry_service",
  "app.core.revenue_metrics_task",
  "app.core.telemetry_polling_task",
  "app.core.anomaly_metrics_task",
  "app.services.operator_dashboard_service",
  "app.api.v1.servers_crud",
  "app.api.v1.agent",
  "app.api.v1.servers_peers",
  "app.services.node_runtime_agent",
  "app.services.vpn_node_service",
  "app.services.control_plane_service",
  "app.api.v1.users",
  "app.api.v1.servers",
  "app.services.node_runtime_docker",
  "app.services.abuse_detection_service",
  "app.services.reconciliation_engine",
  "app.services.snapshot_cache",
  "app.services.server_live_key_service",
  "app.services.device_telemetry_cache",
  "app.services.admin_issue_service",
  "app.services.issue_service",
  "app.api.v1.devices",
  "app.live_metrics.aggregator_worker",
]
disable_error_code = ["assignment", "arg-type", "no-any-return", "union-attr", "attr-defined", "index", "misc", "truthy-function", "operator", "unused-ignore", "var-annotated"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
