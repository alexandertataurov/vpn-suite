# Recording rules for continuous metrics across restarts.
# rx/tx counters reset on interface restart; increase() over 1d gives daily delta per peer.
# Use for dashboards and long-term aggregation (target-architecture §8).
groups:
  - name: wireguard_1d
    interval: 1h
    rules:
      - record: wireguard_received_bytes_1d_increase
        expr: increase(wireguard_received_bytes[1d])
      - record: wireguard_sent_bytes_1d_increase
        expr: increase(wireguard_sent_bytes[1d])

  - name: http_latency_quantiles
    interval: 1m
    rules:
      - record: http_request_duration_seconds:p50
        expr: histogram_quantile(0.5, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, path_template))
      - record: http_request_duration_seconds:p95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, path_template))
      - record: http_request_duration_seconds:p99
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, path_template))

  - name: frontend_web_vitals
    interval: 2m
    rules:
      - record: frontend_web_vital_lcp_ms:p75
        expr: histogram_quantile(0.75, sum(rate(frontend_web_vital_ms_bucket{name="LCP"}[10m])) by (le, app, route))
      - record: frontend_web_vital_inp_ms:p75
        expr: histogram_quantile(0.75, sum(rate(frontend_web_vital_ms_bucket{name="INP"}[10m])) by (le, app, route))
      - record: frontend_web_vital_cls:p75
        expr: histogram_quantile(0.75, sum(rate(frontend_web_vital_score_bucket{name="CLS"}[10m])) by (le, app, route))
      - record: frontend_web_vital_ttfb_ms:p75
        expr: histogram_quantile(0.75, sum(rate(frontend_web_vital_ms_bucket{name="TTFB"}[10m])) by (le, app, route))
      - record: frontend_web_vital_fcp_ms:p75
        expr: histogram_quantile(0.75, sum(rate(frontend_web_vital_ms_bucket{name="FCP"}[10m])) by (le, app, route))
