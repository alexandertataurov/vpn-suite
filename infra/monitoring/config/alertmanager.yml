# VPN Suite Alertmanager. P1 (critical) -> Telegram; P2 (warning) -> Telegram.
# Set runbook_url, dashboard_url, affected_service in alert rules.
# Env: ALERTMANAGER_TELEGRAM_BOT_TOKEN, ALERTMANAGER_TELEGRAM_CHAT_ID.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "job", "server_id", "node_id"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: p1
      continue: true
    - match:
        severity: warning
      receiver: p2

receivers:
  - name: default
    # No-op; use for dev or when no integrations configured.

  - name: p1
    # P1: critical -> Telegram
    telegram_configs:
      - bot_token: ${ALERTMANAGER_TELEGRAM_BOT_TOKEN}
        chat_id: ${ALERTMANAGER_TELEGRAM_CHAT_ID}
        send_resolved: true
        message: |
          [P1] {{ .GroupLabels.alertname }}
          {{ range .Alerts }}{{ .Annotations.summary }} — {{ .Annotations.description }}{{ end }}
          Runbook: {{ range .Alerts }}{{ .Annotations.runbook_url }}{{ end }}
          Dashboard: {{ range .Alerts }}{{ .Annotations.dashboard_url }}{{ end }}

  - name: p2
    # P2: warning -> Telegram
    telegram_configs:
      - bot_token: ${ALERTMANAGER_TELEGRAM_BOT_TOKEN}
        chat_id: ${ALERTMANAGER_TELEGRAM_CHAT_ID}
        send_resolved: true
        message: |
          [P2] {{ .GroupLabels.alertname }}
          {{ range .Alerts }}{{ .Annotations.summary }} — {{ .Annotations.description }}{{ end }}
          Runbook: {{ range .Alerts }}{{ .Annotations.runbook_url }}{{ end }}
          Dashboard: {{ range .Alerts }}{{ .Annotations.dashboard_url }}{{ end }}

inhibit_rules:
  # When Admin API is down, do not also fire ScrapeTargetDown for admin-api (redundant).
  - source_match:
      alertname: AdminApiDown
    target_match:
      alertname: ScrapeTargetDown
    equal: ["job", "instance"]
  - source_match:
      alertname: AdminApiDown
    target_match:
      alertname: PrometheusTargetDown
    equal: ["job", "instance"]
  # SLO fast burn suppresses slow burn.
  - source_match:
      alertname: AdminApiErrorBudgetBurnFast
    target_match:
      alertname: AdminApiErrorBudgetBurnSlow
    equal: ["job"]
  - source_match:
      alertname: AdminApiLatencyBudgetBurnFast
    target_match:
      alertname: AdminApiLatencyBudgetBurnSlow
    equal: ["job"]
  - source_match:
      alertname: PaymentsErrorBudgetBurnFast
    target_match:
      alertname: PaymentsErrorBudgetBurnSlow
    equal: ["job"]
  - source_match:
      alertname: ProvisioningErrorBudgetBurnFast
    target_match:
      alertname: ProvisioningErrorBudgetBurnSlow
    equal: ["job"]
