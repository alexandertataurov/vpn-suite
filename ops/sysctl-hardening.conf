# HARDENING: Kernel tuning for VPN Suite (10x peer capacity).
# Apply: sudo sysctl -p ops/sysctl-hardening.conf
# Or: cp ops/sysctl-hardening.conf /etc/sysctl.d/99-vpn-suite.conf && sysctl -p /etc/sysctl.d/99-vpn-suite.conf
# Note: nf_conntrack is loaded when iptables/nftables is used; if missing, load with modprobe nf_conntrack

# Conntrack: 10x peers (default 65536 -> 262144)
net.netfilter.nf_conntrack_max = 262144
net.netfilter.nf_conntrack_tcp_timeout_established = 432000

# Syn backlog
net.core.somaxconn = 4096
net.ipv4.tcp_max_syn_backlog = 4096

# Swap: reduce swappiness to avoid lag from swap thrashing (default 60 -> 10)
vm.swappiness = 10
